name: Build and Test

on:
  pull_request:
    branches: [main]

env:
  LANG: "en_US.UTF-8"
  ECLIPSE_REPO: "https://download.eclipse.org/releases/2024-03"

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: ["17"]
      fail-fast: false

    steps:
    - name: Setup Locale
      if: runner.os == 'Linux'
      run: |
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8

    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    - name: Setup Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin

    - name: Cache local Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build and run tests (Linux)
      if: runner.os == 'Linux'
      uses: GabrielBB/xvfb-action@v1
      with:
        run: >-
          mvn clean verify -U -fae
          -DskipITests=true
          -Dmaven.test.error.ignore=true
          -Dmaven.test.failure.ignore=true
          -ntp

    - name: Build and run tests (macOS / Windows)
      if: runner.os != 'Linux'
      shell: bash
      run: >-
        mvn clean verify -U -fae
        "-DskipITests=true"
        "-Dmaven.test.error.ignore=true"
        "-Dmaven.test.failure.ignore=true"
        -ntp

    - name: Verify p2 installation (Linux)
      if: runner.os == 'Linux'
      run: |
        curl -L -o eclipse.tar.gz "https://www.eclipse.org/downloads/download.php?file=/eclipse/downloads/drops4/R-4.31-202402290520/eclipse-SDK-4.31-linux-gtk-x86_64.tar.gz&r=1"
        tar xzf eclipse.tar.gz
        ./eclipse/eclipse \
          -nosplash \
          -application org.eclipse.equinox.p2.director \
          -repository "file:$(pwd)/site/target/repository/,$ECLIPSE_REPO" \
          -installIU org.hibernate.tool.eclipse.orm.main.feature.group,org.hibernate.search.eclipse.feature.feature.group \
          -destination ./eclipse

    - name: Verify p2 installation (macOS)
      if: runner.os == 'macOS'
      run: |
        curl -L -o eclipse.tar.gz "https://www.eclipse.org/downloads/download.php?file=/eclipse/downloads/drops4/R-4.31-202402290520/eclipse-SDK-4.31-macosx-cocoa-aarch64.tar.gz&r=1"
        tar xzf eclipse.tar.gz
        ./Eclipse.app/Contents/MacOS/eclipse \
          -nosplash \
          -application org.eclipse.equinox.p2.director \
          -repository "file:$(pwd)/site/target/repository/,$ECLIPSE_REPO" \
          -installIU org.hibernate.tool.eclipse.orm.main.feature.group,org.hibernate.search.eclipse.feature.feature.group \
          -destination ./Eclipse.app/Contents/Eclipse

    - name: Verify p2 installation (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        curl -L -o eclipse.zip "https://www.eclipse.org/downloads/download.php?file=/eclipse/downloads/drops4/R-4.31-202402290520/eclipse-SDK-4.31-win32-x86_64.zip&r=1"
        unzip -q eclipse.zip
        ./eclipse/eclipsec.exe \
          -nosplash \
          -application org.eclipse.equinox.p2.director \
          -repository "file:$(cygpath -m $(pwd))/site/target/repository/,$ECLIPSE_REPO" \
          -installIU org.hibernate.tool.eclipse.orm.main.feature.group,org.hibernate.search.eclipse.feature.feature.group \
          -destination ./eclipse

    - name: Archive test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ matrix.os }}-${{ matrix.java }}-test-reports
        path: |
          **/*target/surefire-reports/
          **/*.log
